<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frontend Mentor advanced css - Challenge 1</title>
  <link rel="stylesheet" href="styles.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
</head>

<body>
  <main class="main">
    <article class="card">
      <div class="card__image">
        <img src="images/image-equilibrium.jpg" alt="">
      </div>
      <h1 class="card__title">Equilibrium #3429</h1>
      <p class="card__description">Our Equilibrium collection promotes blance and calm</p>
      <div class="card__information">
        <div class="card__price">
          <div class="etherium-icon"><img src="images/icon-ethereum.svg" alt=""></div>
          <p>0.041ETH</p>
        </div>
        <div class="card__time">
          <div class="clock-icon"><img src="images/icon-clock.svg" alt=""></div>
          <p>3 days left</p>
        </div>
      </div>
      <div class="divider"></div>
      <div class="card__author">
        <div class="avatar">
          <img src="images/image-avatar.png" alt="">
        </div>
        <p>Creation of <span>Jules Wyvern</span></p>
      </div>
    </article>
  </main>
</body>

</html>
